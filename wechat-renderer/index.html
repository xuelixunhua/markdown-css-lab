<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeChat Markdown Renderer</title>
    <link rel="stylesheet" href="./app.css?v=20260606-wechat-draft-toc" />
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  </head>
  <body>
    <main class="workspace">
      <section class="editor-pane" aria-label="Markdown editor">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark">M</span>
            <div>
              <h1>WeChat Renderer</h1>
              <p id="docStats">0 字 · 0 标题</p>
            </div>
          </div>
          <div class="actions">
            <select class="theme-select" id="themeSelect" title="切换 CSS 主题">
              <option value="wechat">公众号</option>
              <option value="founderWechat">PDF 手册（公众号）</option>
              <option value="technicalWechat">技术文档（公众号）</option>
              <option value="founder">PDF 手册</option>
              <option value="technical">技术文档</option>
            </select>
            <label class="sync-toggle" title="同步 Markdown 和预览的滚动位置">
              <input id="syncScroll" type="checkbox" checked />
              <span>同步滚动</span>
            </label>
            <button class="ghost-btn" id="sampleBtn" type="button">示例</button>
            <button class="ghost-btn" id="clearBtn" type="button">清空</button>
            <button class="primary-btn" id="copyRichBtn" type="button">复制到公众号</button>
          </div>
        </header>

        <div class="tabs" role="tablist" aria-label="Editor tabs">
          <button class="tab active" data-tab="markdown" type="button">Markdown</button>
          <button class="tab" data-tab="css" type="button">CSS</button>
        </div>

        <textarea id="markdownInput" class="editor active" spellcheck="false"></textarea>
        <textarea id="cssInput" class="editor css-editor" spellcheck="false"></textarea>

        <footer class="editor-footer">
          <span id="saveState">已保存</span>
          <div class="footer-actions">
            <button class="text-btn" id="copyHtmlBtn" type="button">复制 HTML</button>
            <button class="text-btn" id="downloadBtn" type="button">导出 HTML</button>
          </div>
        </footer>
      </section>

      <section class="preview-pane" aria-label="WeChat preview">
        <div class="phone-shell">
          <div class="phone-status">
            <span>公众号预览</span>
            <span id="copyState">就绪</span>
          </div>
          <article class="phone-screen">
            <div id="previewHost"></div>
          </article>
        </div>
      </section>
    </main>
    <script src="./app.js?v=20260606-wechat-draft-toc"></script>
  </body>
</html>
